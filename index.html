  function traqlyInitConsentBanner() {
    if (!localStorage.getItem("tracker_consent")) {

      document.body.appendChild(banner);

      document.getElementById("accept-tracking").onclick = function () {
        window.SessionReplayTracker.grantConsent();
        banner.remove();
      };
      document.getElementById("decline-tracking").onclick = function () {
        window.SessionReplayTracker.revokeConsent();
        banner.remove();
      };
    } else if (window.SessionReplayTracker.hasConsent()) {
      window.SessionReplayTracker.grantConsent();
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    if (window.SessionReplayTracker) {
      traqlyInitConsentBanner();
    } else {
      window.addEventListener("load", traqlyInitConsentBanner);
      var check = setInterval(function () {
        if (window.SessionReplayTracker) {
          clearInterval(check);
          traqlyInitConsentBanner();
        }
      }, 100);
    }
  });
</script>
