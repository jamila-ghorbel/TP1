    <!-- Traqly — Session Replay (généré automatiquement) -->
<script type="module">
  import * as rrwebLib from "https://cdn.jsdelivr.net/npm/rrweb@2.1.0/+esm";
  window.rrweb = rrwebLib;
</script>
<script src="http://localhost:3000/t/8797d4cd-743f-49d4-b6c9-dd575893618f.js" async></script>
<script>
  function traqlyInitConsentBanner() {
    if (!localStorage.getItem("tracker_consent")) {
      var banner = document.createElement("div");
      banner.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#111;color:#fff;padding:12px;text-align:center;z-index:9999;font-family:sans-serif;font-size:14px;";
      banner.innerHTML =
        'Ce site utilise un enregistrement de session pour améliorer l\'expérience.' +
        '<button id="accept-tracking" style="margin-left:10px;padding:4px 12px;background:#3b82f6;color:#fff;border:none;border-radius:4px;cursor:pointer;">Accepter</button>' +
        '<button id="decline-tracking" style="margin-left:6px;padding:4px 12px;background:#444;color:#fff;border:none;border-radius:4px;cursor:pointer;">Refuser</button>';
      document.body.appendChild(banner);

      document.getElementById("accept-tracking").onclick = function () {
        window.SessionReplayTracker.grantConsent();
        banner.remove();
      };
      document.getElementById("decline-tracking").onclick = function () {
        window.SessionReplayTracker.revokeConsent();
        banner.remove();
      };
    } else if (window.SessionReplayTracker.hasConsent()) {
      window.SessionReplayTracker.grantConsent();
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    if (window.SessionReplayTracker) {
      traqlyInitConsentBanner();
    } else {
      window.addEventListener("load", traqlyInitConsentBanner);
      var check = setInterval(function () {
        if (window.SessionReplayTracker) {
          clearInterval(check);
          traqlyInitConsentBanner();
        }
      }, 100);
    }
  });
</script>
<!-- Fin Traqly -->
